<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block page_title %}{{ title }}{% endblock %} : WebPulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css">
{% block extra_head %}{% endblock %}
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo">Web<span>Pulse</span></a>
    <nav class="site-nav">
      <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Scraper
      </a>
      <a href="/qa" class="nav-link {% if request.url.path == '/qa' %}active{% endif %}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Q&amp;A
      </a>
      <!-- <a href="/settings" class="nav-link {% if request.url.path == '/settings' %}active{% endif %}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Settings
      </a> -->
    </nav>
    <div class="header-badge">v3.0</div>
  </div>
</header>

<main class="site-main">
  {% block content %}{% endblock %}
</main>

<script src="/static/js/utils.js"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
